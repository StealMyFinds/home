<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>StealMyFinds Admin</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #fafafa;
  padding: 20px;
}

form {
  background: white;
  border: 3px solid black;
  padding: 20px;
  max-width: 700px;
}

label {
  display: block;
  margin-top: 16px;
  font-weight: bold;
}

input,
textarea,
select {

  width: 100%;

  padding: 12px;

  margin-top: 6px;

  border: 2px solid black;

  font-size: 15px;

}

textarea {
  resize: vertical;
  min-height: 100px;
}

button {

  margin-top: 20px;

  background: black;

  color: yellow;

  border: none;

  padding: 14px 18px;

  font-weight: bold;

  cursor: pointer;

}

.image-row {

  display: flex;

  gap: 10px;

  margin-top: 10px;

}

.image-row input {
  flex: 1;
}

.remove-btn {

  background: red;

  color: white;

}

</style>
</head>

<body>

<h1>STEALMYFINDS ADMIN</h1>

<form id="productForm">

  <label>Product Name</label>

  <input type="text"
         id="name"
         required>

  <label>Discounted Price</label>

  <input type="number"
         id="price"
         placeholder="49900"
         required>

  <label>Original Price</label>

  <input type="number"
         id="originalPrice"
         placeholder="79900">

  <label>Category</label>

  <select id="category">

    <option>
      Electronics & Gadgets
    </option>

    <option>
      Fashion & Beauty
    </option>

    <option>
      Home & Kitchen
    </option>

    <option>
      Health & Fitness
    </option>

  </select>

  <label>Description</label>

  <textarea id="description"></textarea>

  <label>Affiliate/Product Link</label>

  <input type="url"
         id="link">

  <label>Deal Of The Day</label>

  <select id="deal">

    <option value="false">
      No
    </option>

    <option value="true">
      Yes
    </option>

  </select>

  <label>Images</label>

  <div id="imageContainer">

    <div class="image-row">

      <input type="url"
             class="image-input"
             placeholder="Image URL">

      <input type="file"
             class="image-file"
             accept="image/*">

      <button type="button"
              class="remove-btn">
        Remove
      </button>

    </div>

  </div>

  <button type="button"
          id="addImageBtn">
    Add More Images
  </button>

  <br>

  <button type="submit">
    SAVE PRODUCT
  </button>

</form>

<script type="module"
        src="js/admin.js"></script>

</body>
</html>
